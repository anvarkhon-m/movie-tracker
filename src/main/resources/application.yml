spring:
  application:
    name: movie-tracker

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/movie_tracker}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-client-secret}
            scope: openid, profile, email
            redirect-uri: "{baseUrl}/api/v1/auth/{registrationId}/callback"

server:
  port: 8080

tmdb:
  api-key: ${TMDB_API_KEY:}
  base-url: https://api.themoviedb.org/3
  image-base-url: https://image.tmdb.org/t/p/w500

omdb:
  api-key: ${OMDB_API_KEY:}
  base-url: https://www.omdbapi.com

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9100}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: movie-tracker
  public-url: ${MINIO_PUBLIC_URL:http://localhost:9100}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-me-must-be-at-least-256-bits-long-for-hmac-sha}
    expiration-ms: 86400000

logging:
  file:
    name: logs/movie-tracker.log
